name: Bug Report
description: Report a bug or incorrect behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to trigger the bug.
      placeholder: |
        1. Call `PUT /plans/:id` with new pricingTiers on a plan that has active subscriptions
        2. Observe FK constraint violation in PostgreSQL
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs Actual Behavior
      description: What should happen vs what actually happens.
      placeholder: |
        **Expected**: Tiers are updated and existing subscriptions continue working
        **Actual**: Database throws FK constraint violation, request fails with 500
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: |
        Verifiable scenarios that prove the bug is fixed.
        Use: "Given [context], when [action], then [expected result]."
      placeholder: |
        - [ ] Given a plan with active subscriptions, when admin updates tier prices, then update succeeds without FK errors
        - [ ] Given existing subscriptions, when tiers are replaced, then subscriptions retain valid pricingTierId references
    validations:
      required: true

  - type: textarea
    id: root-cause
    attributes:
      label: Root Cause Analysis
      description: If known, describe the root cause and affected files.
    validations:
      required: false
