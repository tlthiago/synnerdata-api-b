name: Refactor / Technical Improvement
description: Propose a code refactor or technical debt reduction
labels: ["refactor"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this refactor solve? Why is the current implementation insufficient?
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current Behavior
      description: How the code works today and why it's problematic.
    validations:
      required: true

  - type: textarea
    id: proposed-changes
    attributes:
      label: Proposed Changes
      description: What should change and how. Include approach options if applicable.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: |
        Checklist of verifiable scenarios that prove the refactor works correctly and doesn't break existing behavior.
        Each criterion should be a concrete, testable scenario — not a vague statement.
        Use the format: "Given [context], when [action], then [expected result]."
      placeholder: |
        - [ ] Given a plan with 5 custom tiers, when listing plans, then all tiers are returned correctly
        - [ ] Given existing tests, when running the full suite, then all tests pass without modification
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: What is explicitly NOT part of this issue (prevents scope creep).
      placeholder: "Changing the public API contract — this refactor only restructures internal implementation."
    validations:
      required: false

  - type: textarea
    id: risks
    attributes:
      label: Risks & Migration
      description: Breaking changes, migration needs, rollback strategy.
    validations:
      required: false
