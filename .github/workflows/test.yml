name: Test

on:
  pull_request:
    branches: ["main", "preview"]
  schedule:
    # Full suite daily at 06:00 BRT (09:00 UTC)
    - cron: "0 9 * * *"

permissions:
  contents: read

jobs:
  test:
    name: ${{ github.event_name == 'schedule' && 'Full Test Suite' || 'Affected Tests' }}
    runs-on: ubuntu-latest
    environment: CI/CD

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: synnerdata_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mailhog:
        image: mailhog/mailhog
        ports:
          - 1025:1025
          - 8025:8025

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/synnerdata_test
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SUPER_ADMIN_EMAILS: superadmin@test.com
      ADMIN_EMAILS: admin@test.com
      SKIP_INTEGRATION_TESTS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run migrations
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          PAGARME_BASE_URL: ${{ secrets.PAGARME_BASE_URL }}
          PAGARME_SECRET_KEY: ${{ secrets.PAGARME_SECRET_KEY }}
          PAGARME_PUBLIC_KEY: ${{ secrets.PAGARME_PUBLIC_KEY }}
          PAGARME_WEBHOOK_USERNAME: ${{ secrets.PAGARME_WEBHOOK_USERNAME }}
          PAGARME_WEBHOOK_PASSWORD: ${{ secrets.PAGARME_WEBHOOK_PASSWORD }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY }}
        run: bun run db:migrate

      - name: Detect affected tests
        if: github.event_name == 'pull_request'
        id: affected
        run: |
          BASE_BRANCH="origin/${{ github.base_ref }}"
          RESULT=$(bash scripts/affected-tests.sh "$BASE_BRANCH")
          echo "tests=$RESULT" >> "$GITHUB_OUTPUT"
          echo "Affected tests: $RESULT"

      - name: Run affected tests
        if: github.event_name == 'pull_request' && steps.affected.outputs.tests != 'NO_TESTS'
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          PAGARME_BASE_URL: ${{ secrets.PAGARME_BASE_URL }}
          PAGARME_SECRET_KEY: ${{ secrets.PAGARME_SECRET_KEY }}
          PAGARME_PUBLIC_KEY: ${{ secrets.PAGARME_PUBLIC_KEY }}
          PAGARME_WEBHOOK_USERNAME: ${{ secrets.PAGARME_WEBHOOK_USERNAME }}
          PAGARME_WEBHOOK_PASSWORD: ${{ secrets.PAGARME_WEBHOOK_PASSWORD }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY }}
        run: bun test ${{ steps.affected.outputs.tests }} --coverage --coverage-reporter=lcov --coverage-dir=./coverage

      - name: Run full test suite (scheduled)
        if: github.event_name == 'schedule'
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          PAGARME_BASE_URL: ${{ secrets.PAGARME_BASE_URL }}
          PAGARME_SECRET_KEY: ${{ secrets.PAGARME_SECRET_KEY }}
          PAGARME_PUBLIC_KEY: ${{ secrets.PAGARME_PUBLIC_KEY }}
          PAGARME_WEBHOOK_USERNAME: ${{ secrets.PAGARME_WEBHOOK_USERNAME }}
          PAGARME_WEBHOOK_PASSWORD: ${{ secrets.PAGARME_WEBHOOK_PASSWORD }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY }}
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=./coverage

      - name: Upload coverage to Codecov
        if: always() && (steps.affected.outputs.tests != 'NO_TESTS' || github.event_name == 'schedule')
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Skip (no tests affected)
        if: github.event_name == 'pull_request' && steps.affected.outputs.tests == 'NO_TESTS'
        run: echo "No test files affected by this PR — skipping."
