name: Build

on:
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Bundle
        run: bun build src/index.ts --outdir ./dist --target bun

      - name: Verify bundle
        run: test -f ./dist/index.js && echo "Bundle created successfully"
