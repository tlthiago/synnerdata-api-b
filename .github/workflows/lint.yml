name: Lint

on:
  pull_request:
    branches: ['**']

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run lint:types

      - name: Code lint
        run: bun run lint:check

      - name: Check secrets
        run: bun run secrets:check
