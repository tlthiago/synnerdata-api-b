name: Permissions Sync

on:
  pull_request:
    branches: ['**']
    paths:
      - 'src/lib/auth/permissions.ts'

permissions:
  contents: read

jobs:
  check-sync:
    name: Check permissions sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Resolve frontend ref
        id: resolve-ref
        run: |
          BRANCH="${{ github.head_ref }}"
          if git ls-remote --exit-code --heads https://github.com/tlthiago/synnerdata-web-n.git "refs/heads/$BRANCH" > /dev/null 2>&1; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: tlthiago/synnerdata-web-n
          path: synnerdata-web-n
          ref: ${{ steps.resolve-ref.outputs.ref }}
          sparse-checkout: src/lib/permissions.ts
          sparse-checkout-cone-mode: false

      - name: Compare permissions
        run: ./scripts/check-permissions-sync.sh synnerdata-web-n/src/lib/permissions.ts src/lib/auth/permissions.ts
